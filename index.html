<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Florian Narr | Frontend Developer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
  rel="stylesheet"
/>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
 <!-- HEADER -->
<header class="site-header">
  <div class="site-header__inner">
    <div class="site-header__left">
      <img
        src="assets/imgs/header/3. Language switch.png"
        alt="Language switch"
        class="site-header__lang-switch"
      />

      <nav class="site-header__nav" aria-label="Hauptnavigation">
        <a href="#about" class="site-header__link">About me</a>
        <a href="#skills" class="site-header__link">Skills</a>
        <a href="#projects" class="site-header__link">Projects</a>
      </nav>
    </div>

    <a href="/" class="site-header__logo" aria-label="Florian Narr Startseite">
  <img
    src="assets/imgs/header/Logo Portfolio.png"
    alt="Florian Narr Logo"
    class="site-header__logo-image"
  />
</a>
  </div>
</header>

<!-- HERO -->
<section class="hero" id="hero">
  <div class="hero__inner">
    <div class="hero__center">
      <p class="hero__role">Frontend Developer</p>

      <h1 class="hero__title">Florian Narr</h1>

      <div class="hero__actions">
        <a class="hero__button" href="#projects">Check my work</a>
        <a class="hero__button" href="#contact">Contact me</a>
      </div>
    </div>

    <div class="hero__left-rail">
      <a class="hero__arrow" href="#about" aria-label="Zum nächsten Bereich scrollen">
        <img
          src="assets/imgs/hero/Property 1=Default.png"
          alt=""
        />
      </a>
      <span class="hero__rail-line" aria-hidden="true"></span>
    </div>

    <div class="hero__right-rail">
      <div class="hero__socials" aria-label="Social Links">
        <a
          class="hero__social-link"
          href="mailto:deine@email.de"
          aria-label="E-Mail"
        >
          <img
            class="hero__social-icon hero__social-icon--default"
            src="assets/imgs/hero/Property 1=Mail.png"
            alt=""
          />
          <img
            class="hero__social-icon hero__social-icon--hover"
            src="assets/imgs/hero/Property 1=Mail Hover.png"
            alt=""
          />
        </a>

        <a
          class="hero__social-link"
          href="https://www.linkedin.com/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="LinkedIn"
        >
          <img
            class="hero__social-icon hero__social-icon--default"
            src="assets/imgs/hero/Property 1=Linkedin.png"
            alt=""
          />
          <img
            class="hero__social-icon hero__social-icon--hover"
            src="assets/imgs/hero/Property 1=Linkedin Hovevr.png"
            alt=""
          />
        </a>

        <a
          class="hero__social-link"
          href="https://github.com/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="GitHub"
        >
          <img
            class="hero__social-icon hero__social-icon--default"
            src="assets/imgs/hero/Property 1=GitHub.png"
            alt=""
          />
          <img
            class="hero__social-icon hero__social-icon--hover"
            src="assets/imgs/hero/Property 1=GitHub Hover.png"
            alt=""
          />
        </a>
      </div>

      <span class="hero__rail-line" aria-hidden="true"></span>
    </div>

    <div class="hero__ticker-wrap">
      <div class="hero__ticker" aria-label="Status Banner">
        <span class="hero__ticker-item">Available for remote work</span>
        <img
          class="hero__ticker-dot"
          src="assets/imgs/hero/radio_button_unchecked.png"
          alt=""
        />

        <span class="hero__ticker-item">Frontend Developer</span>
        <img
          class="hero__ticker-dot"
          src="assets/imgs/hero/radio_button_unchecked.png"
          alt=""
        />

        <span class="hero__ticker-item">Based in Rosenheim</span>
        <img
          class="hero__ticker-dot"
          src="assets/imgs/hero/radio_button_unchecked.png"
          alt=""
        />

        <span class="hero__ticker-item">Open to work</span>
      </div>
    </div>
  </div>
</section>
</body>
</html>
